<!DOCTYPE html>
<html>
<head>
  <title>CryptoQuest Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Crypto Quest: Digital Citizen</h1>

<!-- Progress -->
<h2 id="progress">Progress: 0/12</h2>

<!-- Levels container -->
<div id="levels"></div>

<!-- Logout button -->
<button onclick="logout()">Logout</button>

<script src="app.js"></script>

<script>
  // Simple logout
  function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  }
</script>

</body>
</html>
